<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- FREE MAP (Leaflet + OpenStreetMap) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { position:absolute; top:0; bottom:0; width:100%; }

    .controls {
      position:absolute;
      top:10px;
      left:10px;
      z-index:1000;
      display:flex;
      gap:10px;
    }

    .btn {
      background:white;
      border-radius:50%;
      width:50px;
      height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
    }

    .scroll {
      position:absolute;
      bottom:0;
      width:100%;
      height:90px;
      background:white;
      display:flex;
      overflow-x:auto;
      align-items:center;
      gap:10px;
      padding:10px;
      z-index:1000;
    }

    .event {
      width:70px;
      height:70px;
      border-radius:50%;
      background:#ccc;
      flex-shrink:0;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Controls -->
<div class="controls">
  <div class="btn" onclick="setMode('globe')">🌍</div>
  <div class="btn" onclick="setMode('church')">⛪</div>
  <div class="btn" onclick="setMode('leaders')">👥</div>
  <div class="btn" onclick="search()">🔍</div>
</div>

<!-- Bottom scroll -->
<div class="scroll" id="eventScroll"></div>

<script>
const GRAPHQL_ENDPOINT = "YOUR_GRAPHQL_ENDPOINT";
const API_KEY = "YOUR_API_KEY";

let map;
let users = [];
let events = [];
let mode = "globe";

init();

function init() {
  map = L.map('map').setView([59.3293, 18.0686], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  loadData();
}

async function loadData() {
  users = await fetchUsers();
  events = await fetchEvents();

  renderMarkers();
  renderEvents();
}

async function fetchUsers() {
  const query = `
    query {
      listUsers {
        items {
          id
          name
          church
          churchPosition
          locationSharing
          location {
            latitude
            longitude
          }
        }
      }
    }
  `;

  const res = await fetch(GRAPHQL_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({ query })
  });

  const json = await res.json();
  return json.data.listUsers.items;
}

async function fetchEvents() {
  const query = `
    query {
      listPosts(filter: { category: { eq: "Event" } }) {
        items {
          id
          title
          location
          photo
        }
      }
    }
  `;

  const res = await fetch(GRAPHQL_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({ query })
  });

  const json = await res.json();
  return json.data.listPosts.items;
}

function renderMarkers() {
  map.eachLayer(layer => {
    if (layer instanceof L.Marker || layer instanceof L.CircleMarker) {
      map.removeLayer(layer);
    }
  });

  let filtered = users.filter(u => u.location);

  if (mode === "leaders") {
    filtered = filtered.filter(u =>
      u.churchPosition && u.churchPosition.toLowerCase().includes("leader")
    );
  }

  // USERS
  filtered.forEach(user => {
    const lat = user.location.latitude;
    const lng = user.location.longitude;

    if (!lat || !lng) return;

    L.circleMarker([lat, lng], {
      radius: 8,
      color: "#4A6CF7"
    }).addTo(map);
  });

  // EVENTS
  events.forEach(e => {
    if (!e.location) return;

    const [lat, lng] = e.location.split(",").map(Number);

    const marker = L.marker([lat, lng]).addTo(map);
    marker.bindPopup("🔥 Event");

    marker.on("click", () => {
      map.setView([lat, lng], 14);
    });
  });
}

function renderEvents() {
  const container = document.getElementById("eventScroll");
  container.innerHTML = "";

  events.forEach(e => {
    const div = document.createElement("div");
    div.className = "event";

    div.onclick = () => {
      const [lat, lng] = e.location.split(",").map(Number);
      map.setView([lat, lng], 14);
    };

    container.appendChild(div);
  });
}

function setMode(newMode) {
  mode = newMode;
  renderMarkers();
}

function search() {
  alert("Search clicked (build later)");
}
</script>

</body>
</html>
