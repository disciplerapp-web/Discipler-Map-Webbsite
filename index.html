<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Map Debug Fixed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { position:absolute; top:0; bottom:0; width:100%; }

    .log {
      position:absolute;
      top:10px;
      right:10px;
      background:white;
      padding:10px;
      font-size:12px;
      max-width:300px;
      z-index:9999;
      overflow:auto;
      max-height:200px;
    }

    /* 🔥 BIG CENTER VERSION OVERLAY */
    .version-overlay {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      z-index:10000;

      background:rgba(0,0,0,0.85);
      color:white;

      padding:30px 60px;
      border-radius:16px;

      font-size:48px;
      font-weight:800;
      letter-spacing:2px;

      box-shadow:0 10px 30px rgba(0,0,0,0.4);

      pointer-events:none;
    }

    .version-overlay small {
      display:block;
      font-size:18px;
      font-weight:400;
      margin-top:10px;
      opacity:0.8;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- 🔥 BIG VERSION MARKER -->
<div class="version-overlay">
  2.0
  <small>NEW MAP VERSION</small>
</div>

<div class="log" id="log">Logs...</div>

<script>
const GRAPHQL_ENDPOINT = "https://j477ltgkvvhgbazn6ivbfb5be4.appsync-api.eu-north-1.amazonaws.com/graphql";
const API_KEY = "YOUR_API_KEY";

let map;
let users = [];
let events = [];

function log(msg) {
  console.log(msg);
  document.getElementById("log").innerHTML += "<br>" + msg;
}

init();

function init() {
  log("🟢 init map");

  map = L.map('map').setView([59.3293, 18.0686], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  loadData();
}

async function loadData() {
  try {
    users = await fetchUsers();
    events = await fetchEvents();

    log("👤 users loaded: " + users.length);
    log("🔥 events loaded: " + events.length);

    render();

  } catch (e) {
    log("❌ loadData error: " + e.message);
  }
}

async function fetchUsers() {
  log("📡 fetchUsers");

  const query = `
    query {
      listUsers {
        items {
          id
          name
          church
          churchPosition
          location {
            latitude
            longitude
          }
        }
      }
    }
  `;

  const res = await fetch(GRAPHQL_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({ query })
  });

  const json = await res.json();

  log("📡 users raw: " + JSON.stringify(json));

  if (json.errors) {
    log("❌ USERS ERROR: " + json.errors[0].message);
    return [];
  }

  if (!json.data || !json.data.listUsers) {
    log("⚠️ USERS NULL → permission issue (API key not allowed)");
    return [];
  }

  return json.data.listUsers.items || [];
}

async function fetchEvents() {
  log("📡 fetchEvents");

  const query = `
    query {
      listPosts(filter: { category: { eq: "Event" } }) {
        items {
          id
          title
          location
        }
      }
    }
  `;

  const res = await fetch(GRAPHQL_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({ query })
  });

  const json = await res.json();

  log("📡 events raw: " + JSON.stringify(json));

  if (json.errors) {
    log("❌ EVENTS ERROR: " + json.errors[0].message);
    return [];
  }

  return json.data?.listPosts?.items || [];
}

function render() {
  log("🗺️ render markers");

  map.eachLayer(layer => {
    if (layer instanceof L.Marker || layer instanceof L.CircleMarker) {
      map.removeLayer(layer);
    }
  });

  users.forEach(u => {
    if (!u.location) return;

    L.circleMarker([u.location.latitude, u.location.longitude], {
      radius: 6
    }).addTo(map);
  });

  events.forEach(e => {
    if (!e.location) return;

    const [lat, lng] = e.location.split(",").map(Number);
    L.marker([lat, lng]).addTo(map);
  });
}
</script>

</body>
</html>
