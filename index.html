<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet (FREE MAP) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { position:absolute; top:0; bottom:0; width:100%; }

    /* Top controls */
    .controls {
      position:absolute;
      top:10px;
      left:10px;
      z-index:1;
      display:flex;
      gap:10px;
    }

    .btn {
      background:white;
      border-radius:50%;
      width:50px;
      height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
    }

    /* Bottom scroll */
    .scroll {
      position:absolute;
      bottom:0;
      width:100%;
      height:90px;
      background:white;
      display:flex;
      overflow-x:auto;
      align-items:center;
      gap:10px;
      padding:10px;
    }

    .event {
      width:70px;
      height:70px;
      border-radius:50%;
      background:#ccc;
      flex-shrink:0;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Controls -->
<div class="controls">
  <div class="btn" onclick="setMode('globe')">🌍</div>
  <div class="btn" onclick="setMode('church')">⛪</div>
  <div class="btn" onclick="setMode('leaders')">👥</div>
  <div class="btn" onclick="search()">🔍</div>
</div>

<!-- Bottom scroll -->
<div class="scroll" id="eventScroll"></div>

<script>
mapboxgl.accessToken = "YOUR_MAPBOX_TOKEN";

const GRAPHQL_ENDPOINT = "YOUR_GRAPHQL_ENDPOINT";
const API_KEY = "YOUR_API_KEY";

let map;
let markers = [];
let users = [];
let events = [];
let mode = "globe";

init();

async function init() {
  map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/streets-v11",
    center: [18.0686, 59.3293],
    zoom: 10
  });

  users = await fetchUsers();
  events = await fetchEvents();

  renderMarkers();
  renderEvents();
}

async function fetchUsers() {
  const query = `
    query {
      listUsers {
        items {
          id
          name
          church
          churchPosition
          locationSharing
          location {
            latitude
            longitude
          }
        }
      }
    }
  `;

  const res = await fetch(GRAPHQL_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({ query })
  });

  const json = await res.json();
  return json.data.listUsers.items;
}

async function fetchEvents() {
  const query = `
    query {
      listPosts(filter: { category: { eq: "Event" } }) {
        items {
          id
          title
          location
          photo
        }
      }
    }
  `;

  const res = await fetch(GRAPHQL_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({ query })
  });

  const json = await res.json();
  return json.data.listPosts.items;
}

function clearMarkers() {
  markers.forEach(m => m.remove());
  markers = [];
}

function renderMarkers() {
  clearMarkers();

  let filtered = users.filter(u => u.location);

  if (mode === "leaders") {
    filtered = filtered.filter(u =>
      u.churchPosition && u.churchPosition.toLowerCase().includes("leader")
    );
  }

  filtered.forEach(user => {
    const lat = user.location.latitude;
    const lng = user.location.longitude;

    if (!lat || !lng) return;

    const el = document.createElement("div");
    el.style.width = "30px";
    el.style.height = "30px";
    el.style.borderRadius = "50%";
    el.style.background = "#4A6CF7";

    const marker = new mapboxgl.Marker(el)
      .setLngLat([lng, lat])
      .addTo(map);

    markers.push(marker);
  });

  // Events
  events.forEach(e => {
    if (!e.location) return;

    const parts = e.location.split(",");
    const lat = parseFloat(parts[0]);
    const lng = parseFloat(parts[1]);

    const el = document.createElement("div");
    el.innerHTML = "🔥";
    el.style.fontSize = "24px";

    const marker = new mapboxgl.Marker(el)
      .setLngLat([lng, lat])
      .addTo(map);

    markers.push(marker);
  });
}

function renderEvents() {
  const container = document.getElementById("eventScroll");
  container.innerHTML = "";

  events.forEach(e => {
    const div = document.createElement("div");
    div.className = "event";

    div.onclick = () => {
      const parts = e.location.split(",");
      const lat = parseFloat(parts[0]);
      const lng = parseFloat(parts[1]);

      map.flyTo({
        center: [lng, lat],
        zoom: 14
      });
    };

    container.appendChild(div);
  });
}

function setMode(newMode) {
  mode = newMode;
  renderMarkers();
}

function search() {
  alert("Search clicked (build later)");
}
</script>

</body>
</html>
