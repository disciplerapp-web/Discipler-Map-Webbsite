<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Map Debug Fixed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
 
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
 
<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }

.log {
 position:absolute;
 top:10px;
 right:10px;
 background:white;
 padding:10px;
 font-size:12px;
 max-width:300px;
 z-index:9999;
 overflow:auto;
 max-height:200px;
}

/* NEW POPUP DESIGN */
.user-card {
  min-width:220px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.user-header {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.avatar {
  width:45px;
  height:45px;
  border-radius:50%;
  background:#e5e5e5;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.name {
  font-weight:700;
  font-size:15px;
}

.username {
  font-size:12px;
  color:gray;
}

.church {
  font-size:12px;
  margin-top:2px;
  color:#444;
}

.email-btn {
  margin-top:10px;
  display:inline-block;
  padding:6px 10px;
  background:#4a6cf7;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
}
</style>
</head>

<body>

<div id="map"></div>
<div class="log" id="log">Logs...</div>

<script>
const API_BASE = "https://zjt4sxvh0l.execute-api.eu-north-1.amazonaws.com";

let map;
let users = [];
let events = [];
let hasRendered = false;

function log(msg) {
 console.log(msg);
 document.getElementById("log").innerHTML += "<br>" + msg;
}

init();

function init() {
 log("🟢kalle init map");

 map = L.map('map').setView([59.3293, 18.0686], 10);

 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
   attribution: '&copy; OpenStreetMap'
 }).addTo(map);

 loadData();
}

async function loadData() {
 try {
   log("⏳ loading data...");

   const [u, e] = await Promise.all([
     fetchUsers(),
     fetchEvents()
   ]);

   users = u;
   events = e;

   log("👤 users loaded: " + users.length);
   log("🔥 events loaded: " + events.length);

   if (!hasRendered) {
     hasRendered = true;
     render();
   }

 } catch (e) {
   log("❌ loadData error: " + e.message);
 }
}

async function fetchUsers() {
 log("📡 fetchUsers");

 const res = await fetch(`${API_BASE}/users`);
 const json = await res.json();

 return (json || []).map(normalizeUser);
}

async function fetchEvents() {
 log("📡 fetchEvents (disabled for now)");
 return [];
}

/* ---------------------------
 SAFE NORMALIZE (UPDATED)
----------------------------*/
function normalizeUser(u) {
 const loc = u.location?.M || u.location;

 const latRaw = loc?.latitude?.N ?? loc?.latitude;
 const lngRaw = loc?.longitude?.N ?? loc?.longitude;

 return {
   ...u,
   name: u.name?.S || u.name,
   email: u.email?.S || u.email,
   username: u.username?.S || u.username,
   church: u.church?.S || u.church,
   churchPosition: u.churchPosition?.S || u.churchPosition,   // ✅ ADDED

   ghostMode: u.ghostMode?.BOOL === true,

   latitude: latRaw !== undefined && latRaw !== null ? parseFloat(latRaw) : null,
   longitude: lngRaw !== undefined && lngRaw !== null ? parseFloat(lngRaw) : null
 };
}

/* ---------------------------
 ICON (UPDATED)
----------------------------*/
function createIcon(u) {

 const position = (u.churchPosition || "").toLowerCase().trim();
 const isChurchLeader = position === "church leader";

 return L.divIcon({
   className: "",
   html: `
     <div style="
       width:30px;
       height:30px;
       border-radius:50%;
       background:${isChurchLeader ? "#f59e0b" : "#4a6cf7"};
       display:flex;
       align-items:center;
       justify-content:center;
       color:white;
       font-size:14px;
       border:2px solid white;
       box-shadow:0 2px 6px rgba(0,0,0,0.3);
     ">
       ${isChurchLeader ? "🏛️" : "👤"}
     </div>
   `,
   iconSize: [30, 30],
   iconAnchor: [15, 15]
 });
}

/* ---------------------------
 RENDER MAP (UPDATED POPUP)
----------------------------*/
function render() {
 log("🗺️ render markers");

 map.eachLayer(layer => {
   if (layer instanceof L.Marker) {
     map.removeLayer(layer);
   }
 });

 let validCount = 0;

 users
   .filter(u => !u.ghostMode)
   .forEach(u => {

     const lat = Number(u.latitude);
     const lng = Number(u.longitude);

     if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

     validCount++;

     const marker = L.marker([lat, lng], {
       icon: createIcon(u)
     }).addTo(map);

     marker.on("click", () => {
       map.setView([lat, lng], 15, { animate: true });
       marker.openPopup();
     });

     const initial = (u.name || "U").charAt(0).toUpperCase();

     marker.bindPopup(`
       <div class="user-card">
         
         <div class="user-header">
           <div class="avatar">${initial}</div>

           <div>
             <div class="name">${u.name || "No name"}</div>
             <div class="username">@${u.username || "unknown"}</div>
             <div class="church">${u.church || ""}</div>
           </div>
         </div>

         ${u.email ? `
           <a class="email-btn" href="mailto:${u.email}">
             ✉ Email
           </a>
         ` : ""}
       </div>
     `);
   });

 log("✅ valid markers rendered: " + validCount);

 events.forEach(e => {
   if (!e.location) return;

   const [lat, lng] = e.location.split(",").map(Number);
   if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

   L.marker([lat, lng]).addTo(map);
 });
}
</script>

</body>
</html>
